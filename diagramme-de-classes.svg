<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1f3a5f"/>
    </marker>
    <marker id="arrowB" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d7bd6"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8a93a3"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="760" fill="#f4f6f9"/>
  <text x="600" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#1f3a5f">GUIDE — Diagramme de classes (entités JPA)</text>

  <!-- ===================== RELATIONS (dessinées avant les boîtes) ===================== -->
  <!-- Filiere vers Module -->
  <path d="M1045,150 L1045,300" stroke="#1f3a5f" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="1052" y="170" font-size="12" fill="#1f3a5f">1</text>
  <text x="1052" y="295" font-size="12" fill="#1f3a5f">*</text>
  <text x="1052" y="232" font-size="11" fill="#56627a">contient</text>

  <!-- Module vers Ressource -->
  <path d="M950,360 L860,385" stroke="#1f3a5f" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="930" y="355" font-size="12" fill="#1f3a5f">1</text>
  <text x="870" y="378" font-size="12" fill="#1f3a5f">*</text>

  <!-- Module vers Tutoriel -->
  <path d="M955,415 C880,470 900,600 860,615" stroke="#1f3a5f" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="905" y="455" font-size="12" fill="#1f3a5f">1</text>
  <text x="868" y="608" font-size="12" fill="#1f3a5f">*</text>

  <!-- User vers Favori -->
  <path d="M250,345 C300,310 320,210 350,178" stroke="#3d7bd6" stroke-width="2" fill="none" marker-end="url(#arrowB)"/>
  <text x="258" y="335" font-size="12" fill="#3d7bd6">1</text>
  <text x="335" y="190" font-size="12" fill="#3d7bd6">*</text>

  <!-- Favori vers Ressource -->
  <path d="M540,168 C600,180 630,300 660,340" stroke="#3d7bd6" stroke-width="2" fill="none" marker-end="url(#arrowB)"/>
  <text x="548" y="165" font-size="12" fill="#3d7bd6">*</text>
  <text x="640" y="335" font-size="12" fill="#3d7bd6">1</text>

  <!-- User vers Progression -->
  <path d="M250,385 L350,375" stroke="#3d7bd6" stroke-width="2" fill="none" marker-end="url(#arrowB)"/>
  <text x="258" y="378" font-size="12" fill="#3d7bd6">1</text>
  <text x="335" y="370" font-size="12" fill="#3d7bd6">*</text>

  <!-- Progression vers Ressource -->
  <path d="M540,375 L660,390" stroke="#3d7bd6" stroke-width="2" fill="none" marker-end="url(#arrowB)"/>
  <text x="548" y="368" font-size="12" fill="#3d7bd6">*</text>
  <text x="645" y="385" font-size="12" fill="#3d7bd6">1</text>

  <!-- User vers Question (etudiant) -->
  <path d="M170,470 C220,510 300,540 350,560" stroke="#3d7bd6" stroke-width="2" fill="none" marker-end="url(#arrowB)"/>
  <text x="200" y="505" font-size="11" fill="#3d7bd6">1 (étudiant)</text>
  <text x="335" y="555" font-size="12" fill="#3d7bd6">*</text>

  <!-- User vers Question (mentor) -->
  <path d="M120,470 C120,600 230,650 350,640" stroke="#3d7bd6" stroke-width="2" stroke-dasharray="2,3" fill="none" marker-end="url(#arrowB)"/>
  <text x="150" y="640" font-size="11" fill="#3d7bd6">1 (mentor) répond</text>

  <!-- Question vers Ressource (0..1) -->
  <path d="M560,575 C610,545 640,500 660,470" stroke="#3d7bd6" stroke-width="2" fill="none" marker-end="url(#arrowB)"/>
  <text x="565" y="568" font-size="12" fill="#3d7bd6">*</text>
  <text x="640" y="478" font-size="12" fill="#3d7bd6">0..1</text>

  <!-- Progression vers StatutProgression -->
  <path d="M350,400 C320,470 300,560 272,600" stroke="#8a93a3" stroke-width="1.7" fill="none" marker-end="url(#arrowG)"/>

  <!-- User vers Role -->
  <path d="M145,300 L145,130" stroke="#8a93a3" stroke-width="1.7" fill="none" marker-end="url(#arrowG)"/>

  <!-- User vers Filiere (inscrit) par le haut -->
  <path d="M210,300 C260,120 700,90 950,100" stroke="#8a93a3" stroke-width="1.7" stroke-dasharray="5,4" fill="none" marker-end="url(#arrowG)"/>
  <text x="520" y="92" font-size="11" fill="#56627a">inscrit à (0..1)</text>

  <!-- Ressource vers User (auteur) par le bas -->
  <path d="M740,475 C720,710 300,720 150,475" stroke="#8a93a3" stroke-width="1.7" stroke-dasharray="5,4" fill="none" marker-end="url(#arrowG)"/>
  <text x="430" y="715" font-size="11" fill="#56627a">auteur (mentor) — Ressource &amp; Tutoriel → User</text>

  <!-- ===================== BOÎTES ===================== -->
  <!-- Role enum -->
  <g>
    <rect x="70" y="40" width="150" height="92" rx="6" fill="#fff" stroke="#8a93a3"/>
    <rect x="70" y="40" width="150" height="24" rx="6" fill="#6b7280"/>
    <text x="145" y="57" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">«enum» Role</text>
    <text x="80" y="80" font-size="11.5" fill="#1f2937">ADMIN</text>
    <text x="80" y="98" font-size="11.5" fill="#1f2937">MENTOR</text>
    <text x="80" y="116" font-size="11.5" fill="#1f2937">ETUDIANT</text>
  </g>

  <!-- User -->
  <g>
    <rect x="40" y="300" width="210" height="170" rx="6" fill="#fff" stroke="#1f3a5f"/>
    <rect x="40" y="300" width="210" height="26" rx="6" fill="#1f3a5f"/>
    <text x="145" y="318" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">User</text>
    <text x="50" y="342" font-size="11.5" fill="#1f2937">- id : Long</text>
    <text x="50" y="360" font-size="11.5" fill="#1f2937">- username : String</text>
    <text x="50" y="378" font-size="11.5" fill="#1f2937">- fullName : String</text>
    <text x="50" y="396" font-size="11.5" fill="#1f2937">- email : String</text>
    <text x="50" y="414" font-size="11.5" fill="#1f2937">- password : String (BCrypt)</text>
    <text x="50" y="432" font-size="11.5" fill="#1f2937">- role : Role</text>
    <text x="50" y="450" font-size="11.5" fill="#1f2937">- enabled : boolean</text>
  </g>

  <!-- StatutProgression enum -->
  <g>
    <rect x="70" y="560" width="200" height="92" rx="6" fill="#fff" stroke="#8a93a3"/>
    <rect x="70" y="560" width="200" height="24" rx="6" fill="#6b7280"/>
    <text x="170" y="577" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">«enum» StatutProgression</text>
    <text x="80" y="600" font-size="11.5" fill="#1f2937">NON_COMMENCE</text>
    <text x="80" y="618" font-size="11.5" fill="#1f2937">EN_COURS</text>
    <text x="80" y="636" font-size="11.5" fill="#1f2937">TERMINE</text>
  </g>

  <!-- Favori -->
  <g>
    <rect x="350" y="120" width="190" height="62" rx="6" fill="#fff" stroke="#1f3a5f"/>
    <rect x="350" y="120" width="190" height="24" rx="6" fill="#1f3a5f"/>
    <text x="445" y="137" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Favori</text>
    <text x="360" y="160" font-size="11.5" fill="#1f2937">- id : Long</text>
    <text x="360" y="177" font-size="11.5" fill="#1f2937">- dateAjout : LocalDate</text>
  </g>

  <!-- Progression -->
  <g>
    <rect x="350" y="300" width="190" height="100" rx="6" fill="#fff" stroke="#1f3a5f"/>
    <rect x="350" y="300" width="190" height="24" rx="6" fill="#1f3a5f"/>
    <text x="445" y="317" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Progression</text>
    <text x="360" y="340" font-size="11.5" fill="#1f2937">- id : Long</text>
    <text x="360" y="358" font-size="11.5" fill="#1f2937">- statut : StatutProgression</text>
    <text x="360" y="376" font-size="11.5" fill="#1f2937">- pourcentage : int</text>
    <text x="360" y="394" font-size="11.5" fill="#1f2937">- dateMaj : LocalDate</text>
  </g>

  <!-- Question -->
  <g>
    <rect x="350" y="510" width="210" height="150" rx="6" fill="#fff" stroke="#1f3a5f"/>
    <rect x="350" y="510" width="210" height="24" rx="6" fill="#1f3a5f"/>
    <text x="455" y="527" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Question</text>
    <text x="360" y="550" font-size="11.5" fill="#1f2937">- id : Long</text>
    <text x="360" y="568" font-size="11.5" fill="#1f2937">- contenu : String</text>
    <text x="360" y="586" font-size="11.5" fill="#1f2937">- reponse : String</text>
    <text x="360" y="604" font-size="11.5" fill="#1f2937">- dateCreation : LocalDateTime</text>
    <text x="360" y="622" font-size="11.5" fill="#1f2937">- dateReponse : LocalDateTime</text>
    <text x="360" y="645" font-size="10.5" fill="#56627a">FK: etudiant, mentor, ressource</text>
  </g>

  <!-- Ressource -->
  <g>
    <rect x="660" y="300" width="200" height="175" rx="6" fill="#fff" stroke="#1f3a5f"/>
    <rect x="660" y="300" width="200" height="26" rx="6" fill="#1f3a5f"/>
    <text x="760" y="318" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Ressource</text>
    <text x="670" y="342" font-size="11.5" fill="#1f2937">- id : Long</text>
    <text x="670" y="360" font-size="11.5" fill="#1f2937">- titre : String</text>
    <text x="670" y="378" font-size="11.5" fill="#1f2937">- description : String</text>
    <text x="670" y="396" font-size="11.5" fill="#1f2937">- type : String</text>
    <text x="670" y="414" font-size="11.5" fill="#1f2937">- url : String</text>
    <text x="670" y="432" font-size="11.5" fill="#1f2937">- motsCles : String</text>
    <text x="670" y="450" font-size="11.5" fill="#1f2937">- dateCreation : LocalDate</text>
    <text x="670" y="468" font-size="10.5" fill="#56627a">FK: module, auteur</text>
  </g>

  <!-- Tutoriel -->
  <g>
    <rect x="660" y="560" width="200" height="130" rx="6" fill="#fff" stroke="#1f3a5f"/>
    <rect x="660" y="560" width="200" height="26" rx="6" fill="#1f3a5f"/>
    <text x="760" y="578" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Tutoriel</text>
    <text x="670" y="602" font-size="11.5" fill="#1f2937">- id : Long</text>
    <text x="670" y="620" font-size="11.5" fill="#1f2937">- titre : String</text>
    <text x="670" y="638" font-size="11.5" fill="#1f2937">- contenu : String</text>
    <text x="670" y="656" font-size="11.5" fill="#1f2937">- videoUrl : String</text>
    <text x="670" y="674" font-size="11.5" fill="#1f2937">- dateCreation : LocalDate</text>
  </g>

  <!-- Module -->
  <g>
    <rect x="950" y="300" width="190" height="130" rx="6" fill="#fff" stroke="#1f3a5f"/>
    <rect x="950" y="300" width="190" height="26" rx="6" fill="#1f3a5f"/>
    <text x="1045" y="318" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Module</text>
    <text x="960" y="342" font-size="11.5" fill="#1f2937">- id : Long</text>
    <text x="960" y="360" font-size="11.5" fill="#1f2937">- nom : String</text>
    <text x="960" y="378" font-size="11.5" fill="#1f2937">- niveau : String</text>
    <text x="960" y="396" font-size="11.5" fill="#1f2937">- description : String</text>
    <text x="960" y="416" font-size="10.5" fill="#56627a">FK: filiere</text>
  </g>

  <!-- Filiere -->
  <g>
    <rect x="950" y="58" width="190" height="92" rx="6" fill="#fff" stroke="#1f3a5f"/>
    <rect x="950" y="58" width="190" height="26" rx="6" fill="#1f3a5f"/>
    <text x="1045" y="76" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Filiere</text>
    <text x="960" y="100" font-size="11.5" fill="#1f2937">- id : Long</text>
    <text x="960" y="118" font-size="11.5" fill="#1f2937">- nom : String</text>
    <text x="960" y="136" font-size="11.5" fill="#1f2937">- description : String</text>
  </g>

  <!-- Légende -->
  <g>
    <rect x="950" y="470" width="220" height="110" rx="6" fill="#fff" stroke="#cbd5e1"/>
    <text x="960" y="490" font-size="12" font-weight="700" fill="#1f3a5f">Légende</text>
    <line x1="960" y1="505" x2="995" y2="505" stroke="#1f3a5f" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="1002" y="509" font-size="11" fill="#1f2937">composition (1..*)</text>
    <line x1="960" y1="528" x2="995" y2="528" stroke="#3d7bd6" stroke-width="2" marker-end="url(#arrowB)"/>
    <text x="1002" y="532" font-size="11" fill="#1f2937">association</text>
    <line x1="960" y1="551" x2="995" y2="551" stroke="#8a93a3" stroke-width="1.7" stroke-dasharray="5,4" marker-end="url(#arrowG)"/>
    <text x="1002" y="555" font-size="11" fill="#1f2937">réf. facultative / enum</text>
  </g>
</svg>
