# ============================================================
#  Profil "h2" : base en memoire pour tester sans MySQL
#  Lancer avec :  mvn spring-boot:run -Dspring-boot.run.profiles=h2
# ============================================================
spring.datasource.url=jdbc:h2:mem:guide_db;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Console H2 accessible sur http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
