# ============================================================
#  GUIDE - Configuration principale (MySQL)
# ============================================================
spring.application.name=GUIDE

# ---- Base de donnees MySQL ----
# La base "guide_db" est creee automatiquement si elle n'existe pas.
spring.datasource.url=jdbc:mysql://localhost:3306/guide_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# ---- Thymeleaf (cache desactive en developpement) ----
spring.thymeleaf.cache=false

# ---- Serveur ----
server.port=8080
