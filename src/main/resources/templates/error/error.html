<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Erreur')}"></head>
<body>
<div class="login-wrap">
    <div class="login-box" style="text-align:center">
        <h1 th:text="${status} != null ? ${status} : 'Erreur'">Erreur</h1>
        <p class="sub" th:text="${error} != null ? ${error} : 'Une erreur est survenue'">Une erreur est survenue</p>
        <p class="muted" style="margin-bottom:18px">
            Quelque chose s'est mal passe. Veuillez reessayer.</p>
        <a class="btn btn-primary" style="width:100%" th:href="@{/dashboard}">Retour a l'accueil</a>
    </div>
</div>
</body>
</html>
