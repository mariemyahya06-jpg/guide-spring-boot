<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Filiere')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container">
    <div th:replace="~{fragments/layout :: alerts}"></div>
    <div class="breadcrumb"><a th:href="@{/admin/filieres}">Filieres</a> /
        <span th:text="${filiere.id == null} ? 'Nouvelle' : 'Modifier'">Nouvelle</span></div>
    <h1 class="page-title" th:text="${filiere.id == null} ? 'Nouvelle filiere' : 'Modifier la filiere'">Filiere</h1>

    <div class="card">
        <form th:action="@{/admin/filieres/save}" th:object="${filiere}" method="post">
            <input type="hidden" th:field="*{id}"/>
            <div class="form-group">
                <label>Nom</label>
                <input type="text" th:field="*{nom}"/>
                <span class="error" th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}"></span>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea th:field="*{description}" rows="4"></textarea>
                <span class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>
            </div>
            <button class="btn btn-primary" type="submit">Enregistrer</button>
            <a class="btn btn-light" th:href="@{/admin/filieres}">Annuler</a>
        </form>
    </div>
</div>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
