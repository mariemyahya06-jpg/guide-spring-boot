<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Creer un compte')}"></head>
<body>
<div class="login-wrap" style="padding:30px 0">
    <div class="login-box" style="width:440px">
        <h1>Creer un compte etudiant</h1>
        <p class="sub">Inscrivez-vous pour acceder au portail</p>

        <form th:action="@{/register}" th:object="${registerForm}" method="post">
            <div class="form-group">
                <label>Nom complet</label>
                <input type="text" th:field="*{fullName}"/>
                <span class="error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></span>
            </div>
            <div class="form-group">
                <label>Nom d'utilisateur</label>
                <input type="text" th:field="*{username}"/>
                <span class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" th:field="*{email}"/>
                <span class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" th:field="*{password}"/>
                <span class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
            </div>
            <div class="form-group">
                <label>Confirmation du mot de passe</label>
                <input type="password" th:field="*{confirmPassword}"/>
                <span class="error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></span>
            </div>
            <div class="form-group">
                <label>Filiere</label>
                <select th:field="*{filiereId}">
                    <option value="">-- Choisir --</option>
                    <option th:each="f : ${filieres}" th:value="${f.id}" th:text="${f.nom}">Filiere</option>
                </select>
            </div>
            <div class="form-group">
                <label>Niveau</label>
                <select th:field="*{niveau}">
                    <option value="">-- Choisir --</option>
                    <option th:each="n : ${niveaux}" th:value="${n}" th:text="${n}">L1</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">Creer mon compte</button>
        </form>

        <div class="hint" style="text-align:center">
            Vous avez deja un compte ?
            <a th:href="@{/login}">Se connecter</a>
        </div>
    </div>
</div>
</body>
</html>
