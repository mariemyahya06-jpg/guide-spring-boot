<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Modules')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container">
    <div th:replace="~{fragments/layout :: alerts}"></div>
    <div class="breadcrumb"><a th:href="@{/admin/centre}">Centre d'administration</a> / Modules</div>
    <h1 class="page-title">Gestion des modules</h1>

    <div class="toolbar">
        <a class="btn btn-light" th:href="@{/admin/centre}">&#8592; Centre d'administration</a>
        <form th:action="@{/admin/modules}" method="get">
            <input type="text" name="keyword" th:value="${keyword}" placeholder="Rechercher un module..."/>
            <button class="btn btn-light" type="submit">Rechercher</button>
        </form>
        <a class="btn btn-primary" th:href="@{/admin/modules/new}">+ Nouveau module</a>
    </div>

    <div class="card" style="padding:0;overflow:hidden">
        <table>
            <thead><tr><th>ID</th><th>Nom</th><th>Niveau</th><th>Filiere</th><th>Ressources</th><th>Actions</th></tr></thead>
            <tbody>
            <tr th:each="m : ${modules.content}">
                <td th:text="${m.id}">1</td>
                <td th:text="${m.nom}">Nom</td>
                <td><span class="tag" th:text="${m.niveau}">L1</span></td>
                <td th:text="${m.filiere != null ? m.filiere.nom : '-'}">Filiere</td>
                <td th:text="${m.ressources.size()}">0</td>
                <td>
                    <a class="btn btn-light btn-sm" th:href="@{/admin/modules/{id}/edit(id=${m.id})}">Modifier</a>
                    <form th:action="@{/admin/modules/{id}/delete(id=${m.id})}" method="post" style="display:inline"
                          onsubmit="return confirm('Voulez-vous vraiment supprimer cet element ?');">
                        <button class="btn btn-danger btn-sm" type="submit">Supprimer</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${modules.empty}"><td colspan="6" class="muted" style="text-align:center">Aucun module.</td></tr>
            </tbody>
        </table>
    </div>

    <div class="pagination" th:if="${modules.totalPages > 1}">
        <span th:each="i : ${#numbers.sequence(0, modules.totalPages - 1)}">
            <a th:href="@{/admin/modules(page=${i},keyword=${keyword},sort=${sort})}"
               th:text="${i + 1}" th:classappend="${i == modules.number} ? 'active'">1</a>
        </span>
    </div>
</div>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
