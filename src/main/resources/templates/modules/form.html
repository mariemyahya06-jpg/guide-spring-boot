<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Module')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container">
    <div th:replace="~{fragments/layout :: alerts}"></div>
    <div class="breadcrumb"><a th:href="@{/admin/modules}">Modules</a> /
        <span th:text="${module.id == null} ? 'Nouveau' : 'Modifier'">Nouveau</span></div>
    <h1 class="page-title" th:text="${module.id == null} ? 'Nouveau module' : 'Modifier le module'">Module</h1>

    <div class="card">
        <form th:action="@{/admin/modules/save}" th:object="${module}" method="post">
            <input type="hidden" th:field="*{id}"/>
            <div class="form-group">
                <label>Nom</label>
                <input type="text" th:field="*{nom}"/>
                <span class="error" th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}"></span>
            </div>
            <div class="form-group">
                <label>Niveau</label>
                <select th:field="*{niveau}">
                    <option value="">-- Choisir --</option>
                    <option th:each="n : ${ {'L1','L2','L3','M1','M2'} }" th:value="${n}" th:text="${n}">L1</option>
                </select>
                <span class="error" th:if="${#fields.hasErrors('niveau')}" th:errors="*{niveau}"></span>
            </div>
            <div class="form-group">
                <label>Filiere</label>
                <select name="filiere">
                    <option value="">-- Choisir --</option>
                    <option th:each="f : ${filieres}" th:value="${f.id}" th:text="${f.nom}"
                            th:selected="${module.filiere != null and module.filiere.id == f.id}">Filiere</option>
                </select>
                <span class="error" th:if="${#fields.hasErrors('filiere')}" th:errors="*{filiere}"></span>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea th:field="*{description}" rows="3"></textarea>
            </div>
            <button class="btn btn-primary" type="submit">Enregistrer</button>
            <a class="btn btn-light" th:href="@{/admin/modules}">Annuler</a>
        </form>
    </div>
</div>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
